<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Registro de Asistencia — Dpto. Química UTA</title>
<style>
:root {
  --hdr-dark:   #0d1117;
  --hdr-mid:    #1a1f2e;
  --gold:       #d4a017;
  --gold-l:     #f0c040;
  --teal:       #2a9d8f;
  --teal-l:     #3bbfae;
  --brand:      #2a9d8f;
  --green:      #22c55e;
  --red:        #ef4444;
  --amber:      #f59e0b;
  --uta-navy:   #1a2a6c;
  --uta-blue:   #2a4ba0;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: system-ui, -apple-system, sans-serif;
  min-height: 100vh;
  background: linear-gradient(160deg, #0d1117 0%, #1a1f2e 50%, #0d1117 100%);
  display: flex; align-items: center; justify-content: center; padding: 20px;
}

@media (prefers-color-scheme: dark) {
  .fg  { background: #0d1117 !important; color: #f1f5f9 !important; border-color: #334155 !important; }
  .lbl { color: #94a3b8 !important; }
  .btn-sec { background: #0d1117 !important; color: #94a3b8 !important; border-color: #334155 !important; }
  .tbar { background: #1e293b !important; border-color: #334155 !important; }
  .net-bar { background: #1e293b !important; border-color: #334155 !important; }
  .quick-card { background: #1a1f2e !important; border-color: #334155 !important; }
  .geo-bar { background: #1e293b !important; border-color: #334155 !important; }
}

/* ── CARD ── */
.card {
  background: #fff;
  border-radius: 20px;
  width: 100%; max-width: 400px;
  box-shadow: 0 20px 80px rgba(0,0,0,.6), 0 0 0 1px rgba(212,160,23,.3);
  overflow: hidden;
}

/* ── HEADER PERSONAL ── */
.card-header {
  background: #000000;
  padding: 22px 24px 20px;
  text-align: center;
  position: relative;
  border-bottom: 2px solid var(--gold);
}
.card-header::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: radial-gradient(ellipse at 50% 0%, rgba(212,160,23,.12) 0%, transparent 70%);
  pointer-events: none;
}
.sys-title {
  color: var(--gold-l);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .14em;
  text-transform: uppercase;
  margin-bottom: 14px;
  opacity: .9;
}
.logo-wrap {
  margin: 0 auto 14px;
  width: 200px; height: 200px;
  display: flex; align-items: center; justify-content: center;
  position: relative;
}

@keyframes ring-spin { to { transform: rotate(360deg); } }
.logo-img {
  width: 180px; height: 180px;
  object-fit: contain;
  position: relative; z-index: 1;

}
.logo-ph {
  width: 112px; height: 112px;
  border-radius: 50%;
  background: rgba(212,160,23,.1);
  border: 2px dashed rgba(212,160,23,.4);
  display: flex; align-items: center; justify-content: center;
  font-size: 40px; position: relative; z-index: 1;
}
.prof-name {
  color: rgba(255,255,255,.92);
  font-size: 14px;
  font-weight: 700;
  letter-spacing: .01em;
  margin-bottom: 2px;
}
.prof-sub {
  color: var(--gold);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .06em;
  text-transform: uppercase;
  opacity: .85;
}

/* ── BODY ── */
.card-body { padding: 20px 24px 28px; }
/* ── NET BAR ── */
.net-bar { display:flex; align-items:center; gap:6px; background:#f0fdf4; border:1px solid #bbf7d0; border-radius:8px; padding:6px 12px; margin-bottom:14px; font-size:12px; font-weight:600; color:#16a34a; transition:all .3s; }
.net-bar.offline  { background:#fef2f2; border-color:#fecaca; color:var(--red); }
.net-bar.checking { background:#fefce8; border-color:#fef08a; color:#a16207; }
.net-dot { width:8px; height:8px; border-radius:50%; background:#22c55e; flex-shrink:0; }
.net-dot.offline  { background:var(--red); }
.net-dot.checking { background:var(--amber); animation:pulse-dot 1s infinite; }
.net-dot.online   { animation:pulse-dot 2s infinite; }
@keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:.4} }
/* ── TIMER BAR ── */
.tbar { display:flex; align-items:center; gap:8px; background:#f8fafc; border:1px solid #e2e8f0; border-radius:10px; padding:8px 14px; margin-bottom:16px; font-size:13px; font-weight:600; color:var(--brand); }
.tbar.warn   { background:#fef3c7; border-color:#fde68a; color:#d97706; }
.tbar.danger { background:#fee2e2; border-color:#fecaca; color:var(--red); animation:shake .3s; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }
.tbar-prog { flex:1; height:6px; background:#e2e8f0; border-radius:3px; overflow:hidden; }
.tbar-fill { height:100%; background:var(--brand); border-radius:3px; transition:width .9s linear, background .3s; }
/* ── GEO BAR ── */
.geo-bar { display:flex; align-items:center; gap:8px; background:#f8fafc; border:1px solid #e2e8f0; border-radius:10px; padding:8px 14px; margin-bottom:14px; font-size:12px; font-weight:600; color:var(--brand); transition:all .3s; }
.geo-bar.ok      { background:#f0fdf4; border-color:#bbf7d0; color:#16a34a; }
.geo-bar.warn    { background:#fef3c7; border-color:#fde68a; color:#d97706; }
.geo-bar.err     { background:#fef2f2; border-color:#fecaca; color:var(--red); }
.geo-bar.loading { background:#f0f0ff; border-color:#c7d2fe; color:var(--brand); }
.geo-dot { width:8px; height:8px; border-radius:50%; background:currentColor; flex-shrink:0; }
.geo-dot.spin { animation:pulse-dot .8s infinite; }
/* ── QUICK CONFIRM CARD ── */
.quick-card {
  background: linear-gradient(135deg, #f8faff, #eef2ff);
  border: 2px solid #c7d2fe; border-radius: 16px;
  padding: 20px; margin-bottom: 16px; text-align: center;
}
.quick-avatar {
  width: 64px; height: 64px; border-radius: 50%;
  background: linear-gradient(135deg, var(--uta-navy), var(--uta-blue));
  margin: 0 auto 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; font-weight: 800; color: #fff;
  box-shadow: 0 4px 14px rgba(26,42,108,.3);
}
.quick-name  { font-size: 18px; font-weight: 800; color: var(--uta-navy); margin-bottom: 3px; }
.quick-sub   { font-size: 12px; color: #64748b; margin-bottom: 16px; }
.btn-confirm {
  display: block; width: 100%;
  background: linear-gradient(135deg, #22c55e, #16a34a);
  color: #fff; border: none; border-radius: 12px;
  padding: 16px; font-size: 17px; font-weight: 800;
  cursor: pointer; font-family: inherit;
  transition: transform .1s, box-shadow .15s;
  box-shadow: 0 4px 14px rgba(34,197,94,.45);
  letter-spacing: .02em;
}
.btn-confirm:hover:not(:disabled) { box-shadow: 0 6px 22px rgba(34,197,94,.55); transform: translateY(-1px); }
.btn-confirm:active:not(:disabled) { transform: scale(.98); }
.btn-confirm:disabled { opacity:.5; cursor:not-allowed; box-shadow:none; }
/* ── FORM ── */
h1 { font-size:19px; font-weight:800; color:#1e293b; margin-bottom:6px; }
.sub { color:#64748b; font-size:14px; line-height:1.5; margin-bottom:18px; }
.ico { font-size:40px; margin-bottom:10px; display:block; }
.fg-wrap { text-align:left; margin-bottom:12px; }
.lbl { display:block; font-size:11px; font-weight:700; color:#64748b; margin-bottom:5px; text-transform:uppercase; letter-spacing:.06em; }
.fg { display:block; width:100%; border:2px solid #e2e8f0; border-radius:12px; padding:13px 16px; font-size:16px; font-family:inherit; color:#1e293b; outline:none; transition:border-color .15s, box-shadow .15s; background:#fff; }
.fg:focus { border-color:var(--uta-navy); box-shadow:0 0 0 3px rgba(26,42,108,.1); }
.hint { font-size:11px; color:#94a3b8; margin-top:4px; }
.btn-ok {
  display:block; width:100%; background:linear-gradient(135deg,#f97316,#ea580c);
  color:#fff; border:none; border-radius:12px; padding:16px; font-size:17px; font-weight:800;
  cursor:pointer; margin-top:8px; font-family:inherit; transition:transform .1s, box-shadow .15s;
  box-shadow:0 4px 14px rgba(249,115,22,.45);
  letter-spacing:.02em;
}
.btn-ok:hover:not(:disabled) { box-shadow:0 6px 22px rgba(249,115,22,.55); transform:translateY(-1px); }
.btn-ok:active:not(:disabled) { transform:scale(.98); }
.btn-ok:disabled { opacity:.5; cursor:not-allowed; box-shadow:none; }
.btn-sec { display:block; width:100%; background:transparent; border:1.5px solid #e2e8f0; border-radius:10px; padding:10px; font-size:13px; font-weight:600; color:#64748b; cursor:pointer; margin-top:10px; font-family:inherit; transition:background .15s; }
.btn-sec:hover { background:#f8fafc; }
.err { color:var(--red); font-size:13px; margin-top:10px; min-height:18px; font-weight:500; }
/* ── SUCCESS ── */
.confetti-ring {
  width:90px; height:90px; border-radius:50%;
  background:conic-gradient(var(--green) 0%, #4ade80 25%, #86efac 50%, var(--green) 75%);
  margin:0 auto 18px; display:flex; align-items:center; justify-content:center;
  animation:pop .6s cubic-bezier(.22,1.5,.55,1), spin-slow 8s linear infinite;
  box-shadow:0 0 0 6px rgba(34,197,94,.15), 0 8px 24px rgba(34,197,94,.3);
}
.check-inner { width:72px; height:72px; border-radius:50%; background:var(--green); display:flex; align-items:center; justify-content:center; }
.check-inner svg { width:36px; height:36px; stroke:#fff; stroke-width:4; fill:none; stroke-dasharray:50; stroke-dashoffset:50; animation:draw .4s .3s forwards; }
@keyframes pop      { 0%{transform:scale(0)} 60%{transform:scale(1.12)} 100%{transform:scale(1)} }
@keyframes spin-slow{ to { transform:rotate(360deg); } }
@keyframes draw     { to { stroke-dashoffset:0; } }
.success-name { background:linear-gradient(135deg,#f0fdf4,#dcfce7); border:1px solid #bbf7d0; border-radius:12px; padding:14px 18px; font-size:16px; font-weight:700; color:#15803d; margin-top:14px; }
.success-time { font-size:12px; color:#64748b; margin-top:6px; }
/* ── PARTICLES ── */
.particles { position:absolute; inset:0; pointer-events:none; overflow:hidden; border-radius:20px; }
.p { position:absolute; animation:fall 1.2s ease-in forwards; }
@keyframes fall { 0%{transform:translateY(-20px) rotate(0);opacity:1} 100%{transform:translateY(400px) rotate(720deg);opacity:0} }
</style>
</head>
<body>
<div class="card" id="card" style="position:relative">
  <div class="card-header">
    <div class="sys-title">Sistema de Asistencia</div>
    <div class="logo-wrap" id="logo-wrap"></div>
    <div class="prof-name">Prof. Luis Ossandón Caiconte</div>
    <div class="prof-sub">Asistencia40</div>
  </div>
  <div class="card-body">
    <div class="net-bar checking" id="net-bar">
      <span class="net-dot checking" id="net-dot"></span>
      <span id="net-text">Verificando conexión...</span>
    </div>
    <div id="app">
      <span class="ico">⏳</span>
      <h1>Verificando sesión...</h1>
      <p class="sub">Un momento por favor</p>
    </div>
  </div>
</div>

// Pon en true para activar la verificación de ubicación
var GEOLOC_ENABLED = false;

// Coordenadas del aula (obtén las tuyas en Google Maps: clic derecho → ¿Qué hay aquí?)
var AULA_LAT    = -18.4794;   // Ejemplo: UTA Arica
var AULA_LNG    = -70.3126;

// Radio en metros dentro del cual se acepta el registro
var RADIO_METROS = 100;

// Si es true, bloquea el registro si el estudiante está fuera del radio.
// Si es false, solo muestra advertencia pero permite registrarse igual.
var GEOLOC_ESTRICTO = false;

function validName(s){ return /^[a-zA-ZáéíóúÁÉÍÓÚñÑüÜ\s\-']{1,60}$/.test(s.trim()); }
function pad(n){ return String(n).padStart(2,"0"); }
function fmtLeft(ms){
  if (ms <= 0) return "0 s";
  var m = Math.floor(ms/60000), s = Math.floor((ms%60000)/1000);
  return m > 0 ? m + " min " + pad(s) + " s" : s + " s";
}
function nowTime(){ return new Date().toLocaleTimeString("es-CL",{hour:"2-digit",minute:"2-digit"}); }
function setApp(h){ document.getElementById("app").innerHTML = h; }
function initials(ap,nm){ return ((nm||"").charAt(0) + (ap||"").charAt(0)).toUpperCase(); }

/* ── GEOLOCALIZACIÓN ────────────────────────── */
function distanciaMetros(lat1,lng1,lat2,lng2) {
  var R = 6371000;
  var dLat = (lat2-lat1) * Math.PI/180;
  var dLng = (lng2-lng1) * Math.PI/180;
  var a = Math.sin(dLat/2)*Math.sin(dLat/2) +
          Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
          Math.sin(dLng/2)*Math.sin(dLng/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function checkGeo(onOk, onOutside, onError) {
  if (!GEOLOC_ENABLED) { onOk(); return; }
  if (!navigator.geolocation) { onError("Tu navegador no soporta geolocalización."); return; }

  setGeoBar("loading", "Verificando tu ubicación...", true);

  navigator.geolocation.getCurrentPosition(
    function(pos) {
      var dist = Math.round(distanciaMetros(pos.coords.latitude, pos.coords.longitude, AULA_LAT, AULA_LNG));
      var dentro = dist <= RADIO_METROS;
      if (dentro) {
        setGeoBar("ok", "✓ Ubicación verificada — " + dist + " m del aula", false);
        onOk();
      } else {
        setGeoBar("warn", "⚠ Estás a " + dist + " m del aula (radio: " + RADIO_METROS + " m)", false);
        onOutside(dist);
      }
    },
    function(err) {
      var msg = err.code === 1
        ? "Permiso de ubicación denegado."
        : "No se pudo obtener tu ubicación.";
      setGeoBar("err", "⚠ " + msg, false);
      onError(msg);
    },
    { enableHighAccuracy: true, timeout: 12000, maximumAge: 30000 }
  );
}

function setGeoBar(state, text, spin) {
  var bar = document.getElementById("geo-bar");
  if (!bar) return;
  bar.className = "geo-bar " + state;
  var dot = bar.querySelector(".geo-dot");
  if (dot) dot.className = "geo-dot" + (spin ? " spin" : "");
  var txt = bar.querySelector(".geo-txt");
  if (txt) txt.textContent = text;
}

function geoBarHTML() {
  if (!GEOLOC_ENABLED) return "";
  return '<div class="geo-bar loading" id="geo-bar"><span class="geo-dot spin"></span><span class="geo-txt">Ubicación no verificada</span></div>';
}

/* ── CONFETI ────────────────────────────────── */
function confeti() {
  var card   = document.getElementById("card");
  var colors = ["#d4a017","#f0c040","#2a9d8f","#22c55e","#3bbfae","#fbbf24","#ffffff"];
  var parts  = document.createElement("div"); parts.className = "particles"; card.appendChild(parts);
  for (var i = 0; i < 28; i++) {
    (function(i){
      setTimeout(function(){
        var p = document.createElement("div"); p.className = "p";
        p.style.left              = Math.random()*100 + "%";
        p.style.top               = "-10px";
        p.style.background        = colors[Math.floor(Math.random()*colors.length)];
        p.style.animationDuration = (0.8 + Math.random()*0.9) + "s";
        p.style.animationDelay    = (Math.random()*0.4) + "s";
        p.style.borderRadius      = Math.random() > 0.5 ? "50%" : "2px";
        p.style.width = p.style.height = (5 + Math.random()*9) + "px";
        parts.appendChild(p);
        setTimeout(function(){ if (p.parentNode) p.parentNode.removeChild(p); }, 1800);
      }, i * 50);
    })(i);
  }
  setTimeout(function(){ if (parts.parentNode) parts.parentNode.removeChild(parts); }, 2500);
}

/* ── COUNTDOWN ──────────────────────────────── */
function startCountdown(ses) {
  if (window._ct) clearInterval(window._ct);
  totalMs = ses.expiresAt - Date.now();
  window._ct = setInterval(function(){
    var left = ses.expiresAt - Date.now();
    var tl   = document.getElementById("tleft");
    var tb   = document.getElementById("tbar-el");
    var fill = document.getElementById("tbar-fill");
    if (tl) tl.textContent = fmtLeft(Math.max(0, left));
    if (tb && fill) {
      var pct = Math.max(0, Math.min(100, 100*left/totalMs));
      fill.style.width = pct + "%";
      if (left < 30000) { tb.className = "tbar danger"; fill.style.background = "#ef4444"; }
      else if (left < 60000) { tb.className = "tbar warn"; fill.style.background = "#f59e0b"; }
    }
    if (left <= 0) { clearInterval(window._ct); showMsg("⏰","QR Expirado","Este código ya no está activo.<br>Consulta a tu profesor/a."); }
  }, 1000);
}

/* ── ENVIAR ─────────────────────────────────── */
function doSend(ses, ap, nm, rut, btn, err) {
  if (btn) { btn.disabled = true; btn.textContent = "Guardando..."; }
  if (err) err.textContent = "";
  setNet("checking", "Enviando registro...");

  fetch(GAS, {
    method: "POST",
    body: JSON.stringify({action:"register", code:sid, apellido:ap, nombre:nm, rut:rut||"", name:ap+" "+nm}),
    redirect: "follow"
  })
  .then(function(r){ return r.json(); })
  .then(function(res){
    setNet("online", "Conectado");
    if (res.ok) {
      setSaved(ap, nm, rut||"");
      if (window._ct) clearInterval(window._ct);
      showOk(ap, nm);
    } else if (res.error === "expired") {
      showMsg("⏰","QR Expirado","Este código ya no está activo.<br>Consulta a tu profesor/a.");
    } else if (res.error === "duplicate") {
      showMsg("⚠️","Ya registrado/a","Ya fuiste registrado/a en esta sesión.");
    } else {
      if (btn) { btn.disabled = false; btn.textContent = "Confirmar Asistencia ✓"; }
      if (err)  err.textContent = "Error al guardar. Intenta de nuevo.";
    }
  })
  .catch(function(){
    setNet("offline", "Sin conexión — verifica tu red");
    if (btn) { btn.disabled = false; btn.textContent = "Confirmar Asistencia ✓"; }
    if (err)  err.textContent = "Error de red. Revisa tu conexión.";
  });
}

function sendWithGeo(ses, ap, nm, rut, btn, err) {
  checkGeo(
    function()        { doSend(ses, ap, nm, rut, btn, err); },           // dentro del radio
    function(dist)    {                                                    // fuera del radio
      if (GEOLOC_ESTRICTO) {
        if (btn) { btn.disabled = false; btn.textContent = "Confirmar Asistencia ✓"; }
        if (err)  err.textContent = "Estás demasiado lejos del aula (" + dist + " m). No se puede registrar la asistencia.";
      } else {
        // Modo advertencia: mostrar aviso pero enviar igual
        if (err) err.textContent = "Aviso: estás a " + dist + " m del aula. Registrando de todas formas...";
        setTimeout(function(){ doSend(ses, ap, nm, rut, btn, err); }, 1500);
      }
    },
    function(msg)     {                                                    // error de geo
      if (GEOLOC_ESTRICTO) {
        if (btn) { btn.disabled = false; btn.textContent = "Confirmar Asistencia ✓"; }
        if (err)  err.textContent = msg + " Activa el GPS e intenta de nuevo.";
      } else {
        doSend(ses, ap, nm, rut, btn, err);  // si no es estricto, continúa igual
      }
    }
  );
}

/* ═══════════════════════════════════════════════════════════
   FLUJO 1 — CONFIRMACIÓN RÁPIDA (estudiante reconocido)
═══════════════════════════════════════════════════════════ */
function showQuickConfirm(ses, saved) {
  var left = ses.expiresAt - Date.now();
  var pct  = Math.max(0, Math.min(100, 100*left/Math.max(left, 300000)));

  var html =
    '<div class="tbar" id="tbar-el">'+
    '<span style="font-size:16px">⏱</span>'+
    '<div class="tbar-prog"><div class="tbar-fill" id="tbar-fill" style="width:'+pct+'%"></div></div>'+
    '<span id="tleft">'+fmtLeft(Math.max(0,left))+'</span>'+
    '</div>'+
    geoBarHTML()+
    '<div class="quick-card">'+
    '<div class="quick-avatar">'+initials(saved.ap, saved.nm)+'</div>'+
    '<div class="quick-name">'+saved.nm+' '+saved.ap+'</div>'+
    '<div class="quick-sub">¡Bienvenido/a! Confirma tu asistencia con un toque</div>'+
    (saved.rut ? '<div style="font-size:11px;color:#64748b;margin-bottom:12px">RUT: '+saved.rut+'</div>' : '')+
    '<button class="btn-confirm" id="btn-quick-ok">✓ Confirmar mi asistencia</button>'+
    '</div>'+
    '<button class="btn-sec" id="btn-not-me">👤 ¿No eres '+saved.nm+'? Registrar a otra persona</button>'+
    '<p class="err" id="err"></p>';

  setApp(html);
  startCountdown(ses);

  document.getElementById("btn-quick-ok").addEventListener("click", function(){
    var btn = document.getElementById("btn-quick-ok");
    var err = document.getElementById("err");
    btn.disabled = true; btn.textContent = "Verificando...";
    sendWithGeo(ses, saved.ap, saved.nm, saved.rut, btn, err);
  });

  document.getElementById("btn-not-me").addEventListener("click", function(){
    clearSaved();
    if (window._ct) clearInterval(window._ct);
    showFullForm(ses);
  });
}

/* ═══════════════════════════════════════════════════════════
   FLUJO 2 — FORMULARIO COMPLETO (primera vez o cambio)
═══════════════════════════════════════════════════════════ */
function showFullForm(ses) {
  var left = ses.expiresAt - Date.now();
  var pct  = Math.max(0, Math.min(100, 100*left/Math.max(left, 300000)));

  var html =
    '<div class="tbar" id="tbar-el">'+
    '<span style="font-size:16px">⏱</span>'+
    '<div class="tbar-prog"><div class="tbar-fill" id="tbar-fill" style="width:'+pct+'%"></div></div>'+
    '<span id="tleft">'+fmtLeft(Math.max(0,left))+'</span>'+
    '</div>'+
    geoBarHTML()+
    '<span class="ico">📋</span>'+
    '<h1>Registrar Asistencia</h1>'+
    '<p class="sub">Ingresa tus datos para confirmar tu presencia</p>'+

    '<div class="fg-wrap"><label class="lbl">Apellido</label>'+
    '<input class="fg" type="text" id="inp-ap" placeholder="Tu apellido..." autocomplete="family-name"></div>'+

    '<div class="fg-wrap"><label class="lbl">Nombre</label>'+
    '<input class="fg" type="text" id="inp-nm" placeholder="Tu nombre..." autocomplete="given-name"></div>'+

    '<div class="fg-wrap"><label class="lbl">RUT / ID <span style="font-weight:400;text-transform:none">(opcional)</span></label>'+
    '<input class="fg" type="text" id="inp-rut" placeholder="Ej: 12345678-9" autocomplete="off">'+
    '<p class="hint">Ayuda a diferenciar estudiantes con el mismo nombre</p></div>'+

    '<button class="btn-ok" id="btn-ok">Confirmar Asistencia ✓</button>'+
    '<p class="err" id="err"></p>';

  setApp(html);
  startCountdown(ses);

  var apEl  = document.getElementById("inp-ap");
  var nmEl  = document.getElementById("inp-nm");
  var rutEl = document.getElementById("inp-rut");
  var btn   = document.getElementById("btn-ok");
  var err   = document.getElementById("err");

  apEl.focus();

  apEl.addEventListener("keydown",  function(e){ if(e.key==="Enter") nmEl.focus(); });
  nmEl.addEventListener("keydown",  function(e){ if(e.key==="Enter") rutEl.focus(); });
  rutEl.addEventListener("keydown", function(e){ if(e.key==="Enter") doValidate(); });
  btn.addEventListener("click", doValidate);

  function doValidate() {
    var ap  = apEl.value.trim();
    var nm  = nmEl.value.trim();
    var rut = rutEl.value.trim();
    if (!ap)            { err.textContent = "Por favor ingresa tu apellido.";             apEl.focus(); return; }
    if (!validName(ap)) { err.textContent = "El apellido contiene caracteres no válidos.";apEl.focus(); return; }
    if (!nm)            { err.textContent = "Por favor ingresa tu nombre.";               nmEl.focus(); return; }
    if (!validName(nm)) { err.textContent = "El nombre contiene caracteres no válidos.";  nmEl.focus(); return; }
    btn.disabled = true; btn.textContent = "Verificando...";
    err.textContent = "";
    sendWithGeo(ses, ap, nm, rut, btn, err);
  }
}

/* ── INIT ────────────────────────────────────── */
function init() {
  if (!sid) {
    setNet("offline", "URL inválida");
    showMsg("❌","URL inválida","Escanea el código QR correcto.");
    return;
  }

  fetch(GAS, {redirect:"follow"})
  .then(function(r){ return r.json(); })
  .then(function(data){
    setNet("online", "Conectado");
    var ses = (data.sessions||[]).find(function(s){
      if (!s.active || Date.now() > s.expiresAt) return false;
      return s.code === sid || (s.rotatingCode && s.rotatingCode === sid);
    });
    if (!ses) { showMsg("⏰","QR Expirado","Este código ya no está activo.<br>Consulta a tu profesor/a."); return; }

    var saved = getSaved();
    if (saved && saved.ap && saved.nm) {
      showQuickConfirm(ses, saved);
    } else {
      showFullForm(ses);
    }
  })
  .catch(function(){
    setNet("offline","Sin conexión al servidor");
    showMsg("❌","Error de conexión","No se pudo verificar la sesión.<br>Revisa tu conexión e intenta de nuevo.");
  });
}

init();
</script>
