<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Asistencia40</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Syne:wght@700;800&family=Cormorant+Garamond:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root {
  --brand:#1a6eb5; --brand-d:#145a98; --brand-l:#dbeafe;
  --green:#16a34a; --green-l:#f0fdf4;
  --red:#e03535;   --red-l:#fff1f1;
  --amber:#d97706; --amber-l:#fef9ee;
  --gray-50:#f2f5f9; --gray-100:#e6edf5; --gray-200:#cfdae8;
  --gray-300:#afc2d5; --gray-400:#7896b0; --gray-500:#4f6d88;
  --gray-700:#253d54; --gray-900:#111f30; --text:#162236;
  --sidebar-accent:#1e3550;
  --radius:12px; --shadow:0 1px 4px rgba(14,38,65,.07);
  --shadow-md:0 5px 18px rgba(14,38,65,.11);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',system-ui,-apple-system,sans-serif;background:var(--gray-50);color:var(--text);min-height:100vh}
button{cursor:pointer;font-family:inherit}

/* ── LAYOUT ── */
.layout{display:flex;min-height:100vh}
.sidebar{width:240px;flex-shrink:0;background:var(--gray-900);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;border-right:1px solid rgba(255,255,255,.04)}
.sidebar-logo{padding:20px 18px 16px;border-bottom:1px solid rgba(255,255,255,.07);display:flex;flex-direction:column;align-items:flex-start;gap:10px}
.sidebar-logo-img-wrap{width:100%;display:flex;align-items:center;justify-content:center;padding:4px 0 2px}
.sidebar-logo-img-wrap img{max-width:172px;max-height:72px;width:auto;height:auto;object-fit:contain}
.sidebar-logo-img-placeholder{width:100%;background:rgba(255,255,255,.06);border:1.5px dashed rgba(255,255,255,.15);border-radius:8px;padding:10px;text-align:center;font-size:11.5px;color:rgba(255,255,255,.3);letter-spacing:.04em}
.sidebar-logo h2{display:none}
.sidebar-logo small{display:none}
.app-name-wrap{display:flex;flex-direction:column;align-items:flex-start;gap:0px;padding:2px 2px 0}
.app-name{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;line-height:1;letter-spacing:-0.03em;color:#fff;display:flex;align-items:baseline;gap:0}
.app-name .an-word{color:rgba(255,255,255,.88)}
.app-name .an-num{color:#f0b429;font-size:21px;font-weight:800;letter-spacing:-0.04em;line-height:1}
.app-tagline{font-size:10.5px;font-weight:500;color:rgba(255,255,255,.35);letter-spacing:.12em;text-transform:uppercase;margin-top:5px;padding-left:1px}
.sidebar-nav{flex:1;padding:12px;overflow-y:auto}
.nav-section{margin-bottom:18px}
.nav-label{color:rgba(255,255,255,.28);font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:0 8px;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.nav-btn{width:100%;text-align:left;background:none;border:none;color:rgba(255,255,255,.5);padding:8px 10px;border-radius:8px;font-size:14.5px;font-weight:500;display:flex;align-items:center;gap:8px;transition:.12s;margin-bottom:1px;font-family:'Outfit',sans-serif}
.nav-btn:hover{background:rgba(255,255,255,.07);color:#fff}
.nav-btn.active{background:rgba(26,110,181,.28);color:#6ab4f5}
.nav-btn .ni{font-size:15.5px;width:18px;text-align:center;flex-shrink:0}
.nav-btn .nt{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nav-btn .nstar{font-size:13.5px;opacity:.8}
.main{margin-left:240px;flex:1;display:flex;flex-direction:column}
.topbar{background:#fff;border-bottom:1px solid var(--gray-200);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;gap:12px;box-shadow:0 1px 0 rgba(14,38,65,.05)}
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:14.5px;color:var(--gray-400);flex-shrink:0}
.breadcrumb .sep{color:var(--gray-300)}
.breadcrumb .cur{color:var(--text);font-weight:600}
.topbar-actions{display:flex;align-items:center;gap:8px}
.content{padding:24px;flex:1;max-width:780px}

/* ── BUTTONS ── */
.btn{border:none;border-radius:10px;padding:9px 16px;font-size:14.5px;font-weight:600;transition:.15s;display:inline-flex;align-items:center;gap:7px}
.btn:hover:not(:disabled){filter:brightness(.93)}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-primary{background:var(--brand);color:#fff;box-shadow:0 2px 6px rgba(26,110,181,.30)}
.btn-secondary{background:var(--gray-100);color:var(--gray-700);border:1px solid var(--gray-200)}
.btn-danger{background:var(--red-l);color:var(--red);border:1px solid #fecaca}
.btn-success{background:var(--green-l);color:#16a34a;border:1px solid #bbf7d0}
.btn-ghost{background:transparent;color:var(--gray-500);border:1px solid var(--gray-200)}
.btn-sm{padding:6px 12px;font-size:13.5px}
.btn-lg{padding:12px 22px;font-size:15.5px}
.btn-icon{background:none;border:none;color:var(--gray-400);padding:6px;border-radius:8px;display:inline-flex}
.btn-icon:hover{background:var(--gray-100);color:var(--gray-700)}

/* ── CARDS ── */
.card{background:#fff;border-radius:var(--radius);border:1px solid var(--gray-200);box-shadow:var(--shadow);margin-bottom:14px}
.card-body{padding:18px 20px}
.card-footer{padding:12px 20px;border-top:1px solid var(--gray-100);display:flex;gap:8px;justify-content:flex-end}

/* ── STATS ── */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:#fff;border:1px solid var(--gray-200);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.stat-card::before{content:"";position:absolute;top:0;left:0;right:0;height:3px}
.stat-card.blue::before{background:var(--brand)} .stat-card.green::before{background:#16a34a} .stat-card.amber::before{background:var(--amber)}
.stat-card .sv{font-size:29px;font-weight:800;line-height:1;margin-bottom:3px}
.stat-card .sl{font-size:12.5px;font-weight:600;color:var(--gray-400);text-transform:uppercase;letter-spacing:.05em}
.stat-card.blue .sv{color:var(--brand)} .stat-card.green .sv{color:#16a34a} .stat-card.amber .sv{color:var(--amber)}

/* ── LIST ITEMS ── */
.list-item{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--gray-100);cursor:pointer;transition:background .1s;user-select:none}
.list-item:last-child{border-bottom:none}
.list-item:hover{background:var(--gray-50)}
.li-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.li-body{flex:1;min-width:0}
.li-title{font-weight:600;font-size:15.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.li-sub{font-size:13.5px;color:var(--gray-400);margin-top:2px}
.li-right{display:flex;align-items:center;gap:6px;flex-shrink:0}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:12.5px;font-weight:700}
.badge-green{background:#dcfce7;color:#16a34a} .badge-blue{background:var(--brand-l);color:var(--brand)}
.badge-amber{background:#fef3c7;color:#d97706} .badge-gray{background:var(--gray-100);color:var(--gray-500)}

/* ── FORM ── */
.field{margin-bottom:12px}
.field label{display:block;font-size:13.5px;font-weight:600;color:var(--gray-500);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
.field input,.field textarea{display:block;width:100%;border:1.5px solid var(--gray-200);border-radius:10px;padding:10px 14px;font-size:15.5px;font-family:inherit;background:#fff;color:var(--text);outline:none;transition:border-color .15s}
.field input:focus,.field textarea:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(99,102,241,.1)}
.field textarea{resize:vertical;min-height:68px}

/* ── SEARCH ── */
.search-wrap{position:relative;flex:1;max-width:280px}
.search-inp{width:100%;padding:8px 32px 8px 34px;border:1.5px solid var(--gray-200);border-radius:10px;font-size:14.5px;font-family:inherit;outline:none;background:var(--gray-50);color:var(--text);transition:border-color .15s}
.search-inp:focus{border-color:var(--brand);background:#fff}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--gray-400);pointer-events:none;font-size:14.5px}
.search-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--gray-400);font-size:15.5px;padding:2px;line-height:1}
.search-clear:hover{color:var(--gray-700)}

/* ── FILTERS ── */
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.f-pill{padding:5px 13px;border-radius:20px;border:1.5px solid var(--gray-200);background:#fff;font-size:13.5px;font-weight:600;color:var(--gray-500);cursor:pointer;transition:.12s}
.f-pill.on{background:var(--brand);border-color:var(--brand);color:#fff}
.f-pill:hover:not(.on){border-color:var(--brand);color:var(--brand)}
.sort-sel{padding:6px 10px;border:1.5px solid var(--gray-200);border-radius:8px;font-size:13.5px;font-family:inherit;color:var(--gray-500);background:#fff;cursor:pointer;outline:none;margin-left:auto}
.sort-sel:focus{border-color:var(--brand)}

/* ── VIEW TOGGLE ── */
.view-tog{display:flex;gap:2px;background:var(--gray-100);border-radius:8px;padding:2px}
.view-tog button{padding:5px 10px;border:none;background:transparent;border-radius:6px;font-size:15.5px;cursor:pointer;color:var(--gray-400);transition:.12s}
.view-tog button.on{background:#fff;color:var(--brand);box-shadow:var(--shadow)}

/* ── SECTION LABELS ── */
.sec-lbl{font-size:12.5px;font-weight:700;color:var(--gray-400);text-transform:uppercase;letter-spacing:.06em;padding:4px 2px 8px;display:flex;align-items:center;gap:6px}

/* ── FAVORITES STAR ── */
.fav-btn{background:none;border:none;font-size:20px;padding:4px 8px;flex-shrink:0;cursor:pointer;opacity:.25;transition:opacity .15s,transform .15s;line-height:1}
.fav-btn.on{opacity:1}
.fav-btn:hover{opacity:1;transform:scale(1.2)}

/* ── DRAG ── */
.drag-handle{font-size:17.5px;color:var(--gray-300);padding:4px 8px;flex-shrink:0;cursor:grab;user-select:none;line-height:1}
.drag-handle:hover{color:var(--gray-500)}
.list-item.dragging{opacity:.35;background:var(--brand-l)!important}
.list-item.drag-over{box-shadow:inset 0 3px 0 var(--brand)!important;background:var(--brand-l)!important}

/* ── CALENDAR ── */
.cal-card{background:#fff;border-radius:var(--radius);border:1px solid var(--gray-200);box-shadow:var(--shadow);overflow:hidden;margin-bottom:14px}
.cal-top{padding:16px 20px;border-bottom:1px solid var(--gray-100);display:flex;align-items:center;justify-content:space-between}
.cal-month{font-size:16.5px;font-weight:700}
.cal-nbtn{background:var(--gray-100);border:none;border-radius:8px;padding:6px 12px;font-size:14.5px;cursor:pointer;transition:.12s}
.cal-nbtn:hover{background:var(--gray-200)}
.cal-body{padding:16px 20px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px}
.cal-dh{text-align:center;font-size:11.5px;font-weight:700;color:var(--gray-400);padding:4px 0;text-transform:uppercase}
.cal-day{text-align:center;padding:6px 2px;border-radius:8px;font-size:14.5px;min-height:44px;display:flex;flex-direction:column;align-items:center;gap:3px;transition:background .12s}
.cal-day.today{background:var(--brand-l);color:var(--brand);font-weight:700}
.cal-day.has-cls{cursor:pointer;background:var(--green-l)}
.cal-day.has-cls:hover{background:#bbf7d0}
.cal-day.empty{}
.cal-dot{background:var(--green);color:#fff;border-radius:10px;font-size:9px;font-weight:700;padding:1px 5px;min-width:18px;text-align:center}
.cal-cls-list{border-top:1px solid var(--gray-100);padding-top:14px}
.cal-cls-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;transition:background .12s;margin-bottom:4px}
.cal-cls-item:hover{background:var(--gray-50)}
.cal-cls-date{background:var(--brand-l);color:var(--brand);border-radius:8px;padding:6px 10px;font-size:13.5px;font-weight:700;font-family:monospace;flex-shrink:0;text-align:center;min-width:44px}
.cal-empty{text-align:center;padding:20px;color:var(--gray-400);font-size:14.5px}

/* ── ATTENDANCE ── */
.att-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--gray-100)}
.att-row:last-child{border-bottom:none}
.chk-dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:8px}
.chk-dot.pres{background:var(--green)} .chk-dot.abs{background:var(--gray-300)}

/* ── TOGGLE SWITCH ── */
.toggle-row{display:flex;align-items:flex-start;gap:12px;padding:12px;background:var(--gray-50);border-radius:10px;border:1px solid var(--gray-200)}
.toggle{position:relative;width:42px;height:24px;flex-shrink:0;margin-top:1px}
.toggle input{opacity:0;width:0;height:0}
.toggle-track{position:absolute;inset:0;background:var(--gray-300);border-radius:24px;cursor:pointer;transition:.2s}
.toggle-track:before{content:"";position:absolute;width:18px;height:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
input:checked+.toggle-track{background:var(--brand)}
input:checked+.toggle-track:before{transform:translateX(18px)}
.toggle-text .tt{font-size:14.5px;font-weight:600;color:var(--text)}
.toggle-text .td{font-size:13.5px;color:var(--gray-400);margin-top:2px}

/* ── TABS ── */
.tabs{display:flex;gap:2px;background:var(--gray-100);border-radius:10px;padding:3px;margin-bottom:14px}
.tab-btn{flex:1;padding:8px 12px;border:none;background:transparent;font-size:14.5px;font-weight:600;color:var(--gray-500);border-radius:8px;cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center;gap:6px}
.tab-btn.on{background:#fff;color:var(--brand);box-shadow:var(--shadow)}

/* ── QR ── */
.dur-pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.dur-pill{padding:7px 16px;border-radius:20px;border:1.5px solid var(--gray-200);background:#fff;font-size:14.5px;font-weight:600;color:var(--gray-500);cursor:pointer;transition:.12s}
.dur-pill:hover{border-color:var(--brand);color:var(--brand)}
.dur-pill.on{background:var(--brand);border-color:var(--brand);color:#fff}
.qr-box{display:flex;flex-direction:column;align-items:center;gap:12px;padding:8px 0}
#qrcode canvas,#qrcode img{border-radius:12px;border:4px solid var(--brand-l);box-shadow:var(--shadow-md);outline:1px solid var(--gray-200)}
.qr-url-row{display:flex;gap:8px;max-width:300px;width:100%}
.qr-url-box{flex:1;background:var(--gray-50);border:1px solid var(--gray-200);border-radius:8px;padding:6px 10px;font-size:11.5px;color:var(--gray-400);font-family:monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.timer-display{font-size:33px;font-weight:800;font-family:'Courier New',monospace;color:var(--brand);letter-spacing:2px}
.timer-display.red{color:var(--red)}
.timer-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.rot-banner{background:linear-gradient(135deg,#fef3c7,#fde68a);border:1px solid #fbbf24;border-radius:10px;padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.rot-txt{font-size:13.5px;color:#92400e;font-weight:600}
.rot-cnt{margin-left:auto;background:#fff;color:#d97706;font-weight:800;font-size:14.5px;padding:3px 10px;border-radius:20px;font-family:monospace}

/* ── MISC ── */
.del-btn{background:none;border:none;color:var(--gray-300);font-size:20px;padding:4px 8px;flex-shrink:0;line-height:1}
.del-btn:hover{color:#f87171}
.empty-state{text-align:center;padding:56px 24px}
.empty-state .ei{font-size:52px;margin-bottom:12px;opacity:.35}
.empty-state .et{font-size:17.5px;font-weight:700;color:var(--gray-500);margin-bottom:6px}
.empty-state .es{font-size:14.5px;color:var(--gray-400);margin-bottom:18px}
.modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.6);display:flex;align-items:center;justify-content:center;z-index:300;padding:20px;backdrop-filter:blur(2px)}
.modal-box{background:#fff;border-radius:18px;padding:28px 24px;max-width:340px;width:100%;box-shadow:0 25px 60px rgba(0,0,0,.2);text-align:center}
.modal-actions{display:flex;flex-direction:column;gap:10px;margin-top:20px}
.pres-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.pres-card{border-radius:12px;padding:14px;text-align:center}
.pres-card .pv{font-size:31px;font-weight:800;line-height:1;margin-bottom:4px}
.pres-card .pl{font-size:12.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.pres-card.p{background:var(--green-l)}.pres-card.p .pv,.pres-card.p .pl{color:#16a34a}
.pres-card.a{background:var(--red-l)}.pres-card.a .pv,.pres-card.a .pl{color:var(--red)}
.report-table{width:100%;border-collapse:collapse;font-size:13.5px}
.report-table th{padding:10px 8px;text-align:center;font-size:11.5px;font-weight:700;color:var(--gray-400);text-transform:uppercase;letter-spacing:.04em;border-bottom:2px solid var(--gray-200)}
.report-table th.nc{text-align:left;position:sticky;left:0;background:#fff}
.report-table td{padding:10px 8px;text-align:center;border-bottom:1px solid var(--gray-100)}
.report-table td.nc{text-align:left;font-weight:500;position:sticky;left:0;background:#fff;border-right:1px solid var(--gray-100)}
.full-center{height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.spinner{width:36px;height:36px;border:3px solid var(--brand-l);border-top-color:var(--brand);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:700px){.sidebar{width:200px}.main{margin-left:200px}.stats-row{grid-template-columns:1fr 1fr}}
@media(max-width:540px){.sidebar{display:none}.main{margin-left:0}}
</style>
</head>
<body>

<!-- PANTALLA DE BLOQUEO POR CONTRASEÑA -->
<div id="gate-lock" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0a0a;z-index:999999;display:flex;align-items:center;justify-content:center;font-family:system-ui,sans-serif;">
  <div style="background:#1a1a1a;padding:40px 32px;border-radius:16px;border:1px solid #d4af37;max-width:360px;width:90%;text-align:center;box-shadow:0 10px 40px rgba(212,175,55,0.2);">
    <div style="font-size:48px;margin-bottom:8px;">🔒</div>
    <h2 style="color:#d4af37;margin:0 0 8px 0;font-size:22px;">Panel del Profesor</h2>
    <p style="color:#aaa;margin:0 0 24px 0;font-size:14px;">Acceso restringido</p>
    <input id="gate-pass" type="password" placeholder="Contraseña" autocomplete="off"
      style="width:100%;padding:12px 14px;border-radius:8px;border:1px solid #333;background:#0a0a0a;color:#fff;font-size:15px;box-sizing:border-box;margin-bottom:12px;"
      onkeydown="if(event.key==='Enter')gateCheck()">
    <button onclick="gateCheck()"
      style="width:100%;padding:12px;border-radius:8px;border:none;background:#d4af37;color:#0a0a0a;font-weight:700;font-size:15px;cursor:pointer;">
      Ingresar
    </button>
    <p id="gate-err" style="color:#ff6b6b;font-size:13px;margin:12px 0 0 0;min-height:18px;"></p>
  </div>
</div>

<script>
(function(){
  // Si ya validó en esta sesión, ocultar el gate directamente
  if(sessionStorage.getItem('gate_ok')==='1'){
    document.getElementById('gate-lock').style.display='none';
    return;
  }
  // Ocultar el contenido detrás del gate mientras no se valide
  document.documentElement.style.overflow='hidden';
  // Enfocar el input automáticamente
  setTimeout(function(){ var i=document.getElementById('gate-pass'); if(i) i.focus(); }, 100);
})();

function gateCheck(){
  var pass = document.getElementById('gate-pass').value;
  var err  = document.getElementById('gate-err');
  if(pass === 'LuisOssProfe2026'){
    sessionStorage.setItem('gate_ok','1');
    document.getElementById('gate-lock').style.display='none';
    document.documentElement.style.overflow='';
  } else {
    err.textContent = 'Contraseña incorrecta';
    document.getElementById('gate-pass').value='';
    document.getElementById('gate-pass').focus();
  }

<script>
/* ══════════ CONFIG ══════════ */
var GAS  = "https://script.google.com/macros/s/AKfycbyR1jObtBC-sO7nG1G2AssK6_MJPFEp1k-hvE0bdNNITdoChqeNHogLM5yDMnkx4jdN/exec";
var SURL = "https://lossandon.github.io/";

/* ══════════ STATE ══════════ */
var S = {
  screen:"loading",
  cursos:[], clases:[], sessions:[], attendees:[], roster:[],
  cursoSel:null, claseSel:null,
  dur:10, active:null, tmr:null, poll:null, rotTmr:null, rotEnabled:false, tab:"qr",
  // search / filter / view
  q:"", flt:"all", sort:"new", view:"list",
  calD: new Date(),
  // drag
  drgSrc:null
};

/* ══════════ UTILS ══════════ */
function uid() { return Math.random().toString(36).slice(2,11); }
function c6()  { return Math.random().toString(36).slice(2,8).toUpperCase(); }
function pad(n){ return String(n).padStart(2,"0"); }
function fmtMs(ms){ return pad(Math.floor(ms/60000))+":"+pad(Math.floor((ms%60000)/1000)); }
function fmtD(ts) { return new Date(ts).toLocaleDateString("es-CL"); }
function fmtDShort(ts){ var d=new Date(ts); return pad(d.getDate())+"/"+pad(d.getMonth()+1); }
function fmtT(ts) { return new Date(ts).toLocaleTimeString("es-CL",{hour:"2-digit",minute:"2-digit"}); }
function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function normName(s){ return String(s||"").trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,""); }
function $$(s){ return document.querySelectorAll(s); }
function $(id){ return document.getElementById(id); }
function setContent(h){ $("content").innerHTML=h; }
function setBC(items){ $("breadcrumb").innerHTML=items.map(function(x,i){ return i===items.length-1?'<span class="cur">'+x+'</span>':'<span>'+x+'</span><span class="sep">›</span>'; }).join(""); }
function setTopActions(h){ $("topbar-actions").innerHTML=h; }

/* ══════════ API ══════════ */
function apiFetch(u,o){ return fetch(u,o).then(function(r){ if(!r.ok) throw new Error(r.status); return r.json(); }); }
function get()   { return apiFetch(GAS,{redirect:"follow"}); }
function post(d) { return apiFetch(GAS,{method:"POST",body:JSON.stringify(d),redirect:"follow"}); }
async function load(){
  var d=await get();
  S.cursos=d.cursos||[]; S.clases=d.clases||[];
  S.sessions=d.sessions||[]; S.attendees=d.attendees||[]; S.roster=d.roster||[];
}

/* ══════════ FAVORITES ══════════ */
var LS_FAV = "uta_favs";
function getFavs(){ try{ return JSON.parse(localStorage.getItem(LS_FAV)||"[]"); }catch(e){ return []; } }
function setFavs(f){ try{ localStorage.setItem(LS_FAV,JSON.stringify(f)); }catch(e){} }
function isFav(id){ return getFavs().indexOf(id)>=0; }
function toggleFav(id){ var f=getFavs(),i=f.indexOf(id); if(i>=0) f.splice(i,1); else f.unshift(id); setFavs(f); }

/* ══════════ CLASS ORDER (drag&drop) ══════════ */
function getOrd(cid){ try{ return JSON.parse(localStorage.getItem("uta_ord_"+cid)||"null"); }catch(e){ return null; } }
function setOrd(cid,arr){ try{ localStorage.setItem("uta_ord_"+cid,JSON.stringify(arr)); }catch(e){} }
function orderedClases(cid){
  var list=S.clases.filter(function(c){ return c.cursoId===cid; });
  var ord=getOrd(cid);
  if(!ord) return list.sort(function(a,b){ return b.createdAt-a.createdAt; });
  return list.sort(function(a,b){ var ia=ord.indexOf(a.id),ib=ord.indexOf(b.id); if(ia<0)ia=9999; if(ib<0)ib=9999; return ia-ib; });
}

/* ══════════ SEARCH / FILTER ══════════ */
function filteredCursos(){
  var q=S.q.toLowerCase().trim();
  return S.cursos.filter(function(c){ return !q||c.name.toLowerCase().indexOf(q)>=0; });
}
function filteredClases(cid){
  var q=S.q.toLowerCase().trim();
  var list=orderedClases(cid);
  if(q) list=list.filter(function(cl){ return cl.name.toLowerCase().indexOf(q)>=0||(cl.description||"").toLowerCase().indexOf(q)>=0; });
  if(S.flt==="active")  list=list.filter(function(cl){ return S.sessions.some(function(s){ return s.claseId===cl.id&&s.active&&Date.now()<s.expiresAt; }); });
  if(S.flt==="records") list=list.filter(function(cl){ return S.attendees.some(function(a){ return a.claseId===cl.id; }); });
  if(S.flt==="empty")   list=list.filter(function(cl){ return !S.attendees.some(function(a){ return a.claseId===cl.id; }); });
  if(S.sort==="old")    list=list.slice().sort(function(a,b){ return a.createdAt-b.createdAt; });
  if(S.sort==="most")   list=list.slice().sort(function(a,b){ return S.attendees.filter(function(x){ return x.claseId===b.id; }).length - S.attendees.filter(function(x){ return x.claseId===a.id; }).length; });
  return list;
}

/* ══════════ INIT ══════════ */
async function init(){
  setContent('<div class="full-center"><div class="spinner"></div><p style="color:var(--gray-400);font-size:15.5px">Conectando...</p></div>');
  try{ await load(); S.screen="home"; }
  catch(e){ setContent('<div class="full-center"><div style="font-size:52px">⚠️</div><p style="font-weight:700">Error de conexión</p><button class="btn btn-primary" onclick="init()">Reintentar</button></div>'); return; }
  drawSidebar(); renderHome();
}

/* ══════════ SIDEBAR ══════════ */
function drawSidebar(){
  var h='<div class="nav-section"><div class="nav-label">Inicio</div>';
  h+='<button class="nav-btn'+(S.screen==="home"?" active":"")+'" onclick="gotoHome()"><span class="ni">🏠</span><span class="nt">Mis Cursos</span></button></div>';
  if(S.cursos.length){
    var favs=getFavs();
    if(favs.length){
      h+='<div class="nav-section"><div class="nav-label">⭐ Favoritos</div>';
      favs.forEach(function(id){ var c=S.cursos.find(function(x){ return x.id===id; }); if(!c) return;
        h+='<button class="nav-btn'+(S.cursoSel&&S.cursoSel.id===id?" active":"")+'" onclick="navCurso(\''+esc(id)+'\')"><span class="ni">📚</span><span class="nt">'+esc(c.name)+'</span><span class="nstar">⭐</span></button>';
      });
      h+='</div>';
    }
    h+='<div class="nav-section"><div class="nav-label">Cursos</div>';
    S.cursos.forEach(function(c){
      if(favs.indexOf(c.id)>=0) return;
      h+='<button class="nav-btn'+(S.cursoSel&&S.cursoSel.id===c.id?" active":"")+'" onclick="navCurso(\''+esc(c.id)+'\')"><span class="ni">📚</span><span class="nt">'+esc(c.name)+'</span></button>';
    });
    h+='</div>';
  }
  $("sidebar-nav").innerHTML=h;
}

function navCurso(id){ S.cursoSel=S.cursos.find(function(c){ return c.id===id; }); S.claseSel=null; S.active=null; S.q=""; S.flt="all"; S.sort="new"; S.view="list"; stopAll(); renderCurso(); }
function gotoHome(){ S.cursoSel=null; S.claseSel=null; S.active=null; S.q=""; stopAll(); renderHome(); }

/* ══════════ HOME ══════════ */
function renderHome(){
  S.screen="home"; drawSidebar();
  setBC(["Mis Cursos"]);
  setTopActions(
    '<div class="search-wrap"><span class="search-icon">🔍</span><input class="search-inp" id="s-home" placeholder="Buscar curso..." value="'+esc(S.q)+'">'+
    (S.q?'<button class="search-clear" id="s-home-clr">✕</button>':'')+
    '</div><button class="btn btn-primary btn-sm" id="btn-nc">＋ Nuevo Curso</button>'
  );

  var all=filteredCursos();
  var favIds=getFavs();
  var favList=all.filter(function(c){ return favIds.indexOf(c.id)>=0; });
  var restList=all.filter(function(c){ return favIds.indexOf(c.id)<0; });

  var h="";

  if(!S.cursos.length){
    h='<div class="empty-state"><div class="ei">📚</div><div class="et">No hay cursos todavía</div><div class="es">Crea tu primer curso para comenzar</div></div>';
  } else {
    h+='<div class="stats-row">';
    h+='<div class="stat-card blue"><div class="sv">'+S.cursos.length+'</div><div class="sl">Cursos</div></div>';
    h+='<div class="stat-card green"><div class="sv">'+S.clases.length+'</div><div class="sl">Clases</div></div>';
    h+='<div class="stat-card amber"><div class="sv">'+S.attendees.length+'</div><div class="sl">Registros</div></div>';
    h+='</div>';

    if(!all.length){
      h+='<div class="empty-state" style="padding:40px"><div class="ei">🔍</div><div class="et">Sin resultados</div><div class="es">No hay cursos que coincidan con "'+esc(S.q)+'"</div></div>';
    } else {
      if(favList.length){
        h+='<div class="sec-lbl">⭐ Favoritos</div>';
        h+='<div class="card">'+favList.map(function(c){ return courseRow(c,true); }).join("")+'</div>';
      }
      if(restList.length){

function bindCurso(){
  var curso=S.cursoSel;

  $("btn-ncl").onclick=function(){
    var name=prompt("Nombre de la clase (ej: Clase 1 – Introducción):"); if(!name||!name.trim()) return;
    var desc=prompt("Reseña de la clase (opcional — presiona Cancelar para omitir):");
    addClase(name.trim(), desc?desc.trim():"");
  };
  var brs=$("btn-ros"); if(brs) brs.onclick=function(){ renderRoster(); };
  var brp=$("btn-rep"); if(brp) brp.onclick=function(){ renderReporte(); };

  // Filters
  $$(".f-pill").forEach(function(b){ b.onclick=function(){ S.flt=b.dataset.flt; renderCurso(); }; });
  var ss=$("sort-sel"); if(ss){ ss.onchange=function(){ S.sort=ss.value; renderCurso(); }; }

  // Calendar navigation
  var cp=$("cal-prev"), cn=$("cal-next");
  if(cp){ cp.onclick=function(){ S.calD=new Date(S.calD.getFullYear(),S.calD.getMonth()-1,1); renderCurso(); }; }
  if(cn){ cn.onclick=function(){ S.calD=new Date(S.calD.getFullYear(),S.calD.getMonth()+1,1); renderCurso(); }; }
  $$(".cal-cls-item").forEach(function(b){ b.onclick=function(){ openClase(b.dataset.id); }; });

  // List items click
  $$(".list-item").forEach(function(r){
    r.addEventListener("click",function(e){ if(e.target.closest(".del-btn")||e.target.closest(".drag-handle")) return; openClase(r.dataset.id); });
  });
  $$(".del-cl").forEach(function(b){
    b.addEventListener("click",function(e){ e.stopPropagation(); delClase(b.dataset.id,b.dataset.name); });
  });

  // DRAG & DROP
  var dragItems=$$(".list-item[draggable]");
  dragItems.forEach(function(item){
    item.addEventListener("dragstart",function(e){
      S.drgSrc=item.dataset.id;
      setTimeout(function(){ item.classList.add("dragging"); },0);
      e.dataTransfer.effectAllowed="move";
    });
    item.addEventListener("dragend",function(){
      item.classList.remove("dragging");
      $$(".drag-over").forEach(function(x){ x.classList.remove("drag-over"); });
      S.drgSrc=null;
    });
    item.addEventListener("dragover",function(e){
      e.preventDefault();
      if(S.drgSrc===item.dataset.id) return;
      $$(".drag-over").forEach(function(x){ x.classList.remove("drag-over"); });
      item.classList.add("drag-over");
      e.dataTransfer.dropEffect="move";
    });
    item.addEventListener("dragleave",function(){ item.classList.remove("drag-over"); });
    item.addEventListener("drop",function(e){
      e.preventDefault();
      item.classList.remove("drag-over");
      if(!S.drgSrc||S.drgSrc===item.dataset.id) return;
      var cid=S.cursoSel.id;
      var list=orderedClases(cid);
      var si=list.findIndex(function(c){ return c.id===S.drgSrc; });
      var di=list.findIndex(function(c){ return c.id===item.dataset.id; });
      if(si>=0&&di>=0){ var mv=list.splice(si,1)[0]; list.splice(di,0,mv); setOrd(cid,list.map(function(c){ return c.id; })); }
      S.drgSrc=null; renderCurso();
    });
  });
}

/* ══════════ CALENDAR ══════════ */
function renderCalendar(){
  var cid=S.cursoSel.id;
  var clases=S.clases.filter(function(c){ return c.cursoId===cid; });
  var d=S.calD, year=d.getFullYear(), month=d.getMonth();
  var firstDow=new Date(year,month,1).getDay();
  var startOffset = firstDow===0?6:firstDow-1; // Mon=0
  var daysInMonth=new Date(year,month+1,0).getDate();
  var today=new Date();

  // Build dayMap
  var dayMap={};
  clases.forEach(function(cl){
    var cd=new Date(cl.createdAt);
    if(cd.getFullYear()===year&&cd.getMonth()===month){
      var day=cd.getDate();
      if(!dayMap[day]) dayMap[day]=[];
      dayMap[day].push(cl);
    }
  });

  var months=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
  var dayNames=["Lun","Mar","Mié","Jue","Vie","Sáb","Dom"];

  var h='<div class="cal-card"><div class="cal-top">';
  h+='<button class="cal-nbtn" id="cal-prev">‹</button>';
  h+='<span class="cal-month">'+months[month]+" "+year+'</span>';
  h+='<button class="cal-nbtn" id="cal-next">›</button>';
  h+='</div><div class="cal-body">';
  h+='<div class="cal-grid">';
  dayNames.forEach(function(dn){ h+='<div class="cal-dh">'+dn+'</div>'; });
  for(var i=0;i<startOffset;i++) h+='<div class="cal-day empty"></div>';
  for(var day=1;day<=daysInMonth;day++){
    var isToday=today.getFullYear()===year&&today.getMonth()===month&&today.getDate()===day;
    var hasCls=!!dayMap[day];
    var cls="cal-day"+(isToday?" today":"")+(hasCls?" has-cls":"");
    h+='<div class="'+cls+'"'+(hasCls?'data-day="'+day+'"':'')+'>'+day+(hasCls?'<span class="cal-dot">'+dayMap[day].length+'</span>':'')+'</div>';
  }
  h+='</div>';

  // Month class list
  var monthClases=clases.filter(function(cl){
    var cd=new Date(cl.createdAt); return cd.getFullYear()===year&&cd.getMonth()===month;
  }).sort(function(a,b){ return a.createdAt-b.createdAt; });

  if(monthClases.length){
    h+='<div class="cal-cls-list"><p style="font-size:12.5px;font-weight:700;color:var(--gray-400);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">Clases en '+months[month]+'</p>';
    monthClases.forEach(function(cl){
      var na=S.attendees.filter(function(a){ return a.claseId===cl.id; }).length;
      var live=S.sessions.find(function(s){ return s.claseId===cl.id&&s.active&&Date.now()<s.expiresAt; });
      var cd=new Date(cl.createdAt);
      h+='<div class="cal-cls-item" data-id="'+esc(cl.id)+'">';
      h+='<div class="cal-cls-date">'+pad(cd.getDate())+'<br><span style="font-size:9px;font-weight:600">'+months[month].slice(0,3).toUpperCase()+'</span></div>';
      h+='<div style="flex:1;min-width:0"><div style="font-weight:600;font-size:15.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(cl.name)+(live?'&nbsp;<span class="badge badge-green" style="font-size:11.5px">EN CURSO</span>':'')+'</div>';
      if(cl.description) h+='<div style="font-size:12.5px;color:var(--gray-400)">'+esc(cl.description)+'</div>';
      h+='<div style="font-size:12.5px;color:var(--gray-400)">'+na+' asistencia'+(na!==1?'s':'')+'</div></div>';
      h+='</div>';
    });
    h+='</div>';
  } else {
    h+='<div class="cal-empty">Sin clases en '+months[month]+'</div>';
  }
  h+='</div></div>';
  return h;
}

    h+='<div style="text-align:center;margin-bottom:14px"><span class="badge badge-blue" style="font-size:15.5px;padding:6px 16px">'+pct+'% asistencia</span></div>';
    h+='<div class="card"><div class="card-body" style="padding-bottom:4px">';
    h+='<p style="font-weight:700;margin-bottom:10px;color:#16a34a">✓ Presentes ('+present.length+')</p>';
    if(!present.length) h+='<p style="font-size:14.5px;color:var(--gray-400);padding-bottom:10px">Ninguno aún</p>';
    present.forEach(function(r){ h+='<div class="att-row"><div><span class="chk-dot pres"></span><span style="font-weight:500">'+esc(r.apellido)+', '+esc(r.nombre)+'</span></div></div>'; });
    h+='<p style="font-weight:700;margin:14px 0 10px;color:var(--red)">✗ Ausentes ('+absent.length+')</p>';
    if(!absent.length) h+='<p style="font-size:14.5px;color:#16a34a;font-weight:600;padding-bottom:10px">🎉 ¡Todos presentes!</p>';
    absent.forEach(function(r){
      h+='<div class="att-row"><div><span class="chk-dot abs"></span><span style="color:var(--gray-500)">'+esc(r.apellido)+', '+esc(r.nombre)+'</span></div>';
      if(S.active) h+='<button class="btn btn-success btn-sm" data-add="'+esc(r.id)+'">+ Marcar</button>';
      h+='</div>';
    });
    h+='</div></div>';
  }
  setContent(h);
  bindClase();
  if(active) afterClase(); else startPoll();
}

function bindClase(){
  var bb=$("btn-back-cls"); if(bb) bb.onclick=function(){ stopAll();S.claseSel=null;S.active=null;renderCurso(); };
  var bx=$("btn-xl");       if(bx) bx.onclick=exportCSV;
  var bg=$("btn-gen");      if(bg) bg.onclick=genSes;
  var bn=$("btn-ns");       if(bn) bn.onclick=genSes;
  var bs=$("btn-stop");     if(bs) bs.onclick=stopSes;
  var bc=$("btn-cp");
  if(bc) bc.onclick=function(){ var code=S.active.rotatingCode||S.active.code; navigator.clipboard.writeText(SURL+"?sid="+code).then(function(){ bc.textContent="✓ Copiado!"; setTimeout(function(){ bc.textContent="Copiar"; },2000); }); };
  $$(".dur-pill").forEach(function(b){ b.onclick=function(){ S.dur=parseInt(b.dataset.dur); renderClase(); }; });
  var cr=$("chk-rot"); if(cr) cr.onchange=function(){ S.rotEnabled=cr.checked; };
  $$(".tab-btn").forEach(function(t){ t.onclick=function(){ S.tab=t.dataset.tab; renderClase(); }; });
  $$("[data-add]").forEach(function(b){
    b.onclick=async function(){
      var r=S.roster.find(function(x){ return x.id===b.dataset.add; });
      if(!r||!S.active) return;
      S.attendees.push({id:uid(),sessionId:S.active.id,claseId:S.claseSel.id,cursoId:S.cursoSel.id,apellido:r.apellido,nombre:r.nombre,name:r.apellido+" "+r.nombre,rut:r.rut||"",manual:true,timestamp:Date.now()});
      try{ await post({action:"set",attendees:S.attendees}); }catch(e){}
      renderClase();
    };
  });
}

function afterClase(){ renderQR(); startTimer(); if(S.active.rotating) startRotTimer(); }

function renderQR(){
  var el=$("qrcode"); if(!el) return; el.innerHTML="";
  var code=S.active.rotatingCode||S.active.code, ru=SURL+"?sid="+code;
  setTimeout(function(){ if(window.QRCode) new QRCode(el,{text:ru,width:240,height:240,correctLevel:QRCode.CorrectLevel.M}); },60);
}

function startTimer(){
  if(S.tmr) clearInterval(S.tmr);
  S.tmr=setInterval(function(){
    if(!S.active) return;
    var left=Math.max(0,S.active.expiresAt-Date.now());
    var el=$("tw"); if(el){ el.textContent=fmtMs(left); el.className="timer-display"+(left<60000?" red":""); }
    if(left===0){ clearInterval(S.tmr); S.tmr=null; pollNow(); }
  },1000);
}
function startRotTimer(){
  if(S.rotTmr) clearInterval(S.rotTmr);
  var sl=90;
  S.rotTmr=setInterval(async function(){
    sl--;
    var c=$("rot-counter"); if(c) c.textContent=sl;
    if(sl<=0){
      sl=90;
      if(S.active&&S.active.rotating){
        S.active.rotatingCode=c6();
        S.sessions=S.sessions.map(function(s){ return s.id===S.active.id?S.active:s; });
        try{ await post({action:"set",sessions:S.sessions}); }catch(e){}
        renderQR();
        var ub=document.querySelector(".qr-url-box"); if(ub) ub.textContent=SURL+"?sid="+S.active.rotatingCode;
      }
    }
  },1000);
}
function startPoll(){ if(S.poll) clearInterval(S.poll); S.poll=setInterval(pollNow,5000); }
function stopPoll(){  if(S.poll){ clearInterval(S.poll); S.poll=null; } }
function stopTimer(){ if(S.tmr){  clearInterval(S.tmr);  S.tmr=null; } }
function stopRot(){   if(S.rotTmr){ clearInterval(S.rotTmr); S.rotTmr=null; } }
function stopAll(){   stopPoll(); stopTimer(); stopRot(); }

async function pollNow(){
  if(!S.claseSel) return;
  var cid=S.claseSel.id, wasAct=!!S.active, prev=S.attendees.filter(function(a){ return a.claseId===cid; }).length;
  try{ await load(); }catch(e){ return; }
  if(S.screen!=="clase"||!S.claseSel) return;
  var mySes=S.sessions.filter(function(s){ return s.claseId===cid; });
  var active=mySes.find(function(s){ return s.active&&Date.now()<s.expiresAt; })||null;
  var cur=S.attendees.filter(function(a){ return a.claseId===cid; }).length;
  S.active=active;
  if(wasAct!==!!active||prev!==cur){ renderClase(); return; }
  if(active&&S.tab==="qr"){
    var an=S.attendees.filter(function(a){ return a.sessionId===active.id; }).length;
    var ct=$("acnt"); if(ct) ct.textContent=an+" estudiante"+(an!==1?"s":"")+" registrado"+(an!==1?"s":"");
  }
}

async function genSes(){
  var code=c6(), exp=Date.now()+S.dur*60000;
  var ns={id:uid(),claseId:S.claseSel.id,cursoId:S.cursoSel.id,code:code,createdAt:Date.now(),expiresAt:exp,active:true,rotating:S.rotEnabled,rotatingCode:S.rotEnabled?c6():null};
  S.sessions=S.sessions.map(function(s){ return s.claseId===S.claseSel.id?Object.assign({},s,{active:false}):s; });
  S.sessions.push(ns); S.active=ns;
  try{ await post({action:"set",sessions:S.sessions}); }catch(e){}
  renderClase();
}

async function stopSes(){
  if(!S.active) return;
  var sesId=S.active.id, an=S.attendees.filter(function(a){ return a.sessionId===sesId; }).length;
  var m=document.createElement("div"); m.className="modal-overlay";
  m.innerHTML='<div class="modal-box"><div style="font-size:40px;margin-bottom:10px">⏹</div><div style="font-size:17px;font-weight:700;margin-bottom:8px">Detener sesión QR</div><div style="font-size:14.5px;color:var(--gray-500);line-height:1.6">Hay <strong>'+an+' registro'+(an!==1?'s':'')+'</strong> en esta sesión.<br>¿Qué deseas hacer?</div><div class="modal-actions"><button id="ms-save" class="btn btn-primary btn-lg" style="justify-content:center">✓ Guardar sesión con registros</button><button id="ms-del" class="btn btn-danger btn-lg" style="justify-content:center">🗑 Eliminar sesión y registros</button><button id="ms-can" class="btn btn-secondary btn-lg" style="justify-content:center">Cancelar</button></div></div>';
  document.body.appendChild(m);
  function close(){ if(m.parentNode) document.body.removeChild(m); }
  m.querySelector("#ms-save").onclick=async function(){ close(); stopRot(); S.sessions=S.sessions.map(function(s){ return s.id===sesId?Object.assign({},s,{active:false}):s; }); S.active=null; try{ await post({action:"set",sessions:S.sessions}); await load(); }catch(e){} renderClase(); };
  m.querySelector("#ms-del").onclick=async function(){ if(!confirm("Se eliminarán "+an+" registro"+(an!==1?"s":"")+".\nEsta acción no se puede deshacer.")) return; close(); stopRot(); S.sessions=S.sessions.filter(function(s){ return s.id!==sesId; }); S.attendees=S.attendees.filter(function(a){ return a.sessionId!==sesId; }); S.active=null; try{ await post({action:"set",sessions:S.sessions,attendees:S.attendees}); }catch(e){} renderClase(); };
  m.querySelector("#ms-can").onclick=close;
}

function exportCSV(){
  var clase=S.claseSel;
  var myAtt=S.attendees.filter(function(a){ return a.claseId===clase.id; }).sort(function(a,b){ return a.timestamp-b.timestamp; });
  var rows=[["Apellido","Nombre","RUT","Hora"]].concat(myAtt.map(function(a){ return [a.apellido||"",a.nombre||a.name||"",a.rut||"",fmtT(a.timestamp)]; }));
  var csv=rows.map(function(r){ return r.map(function(v){ return '"'+String(v).replace(/"/g,'""')+'"'; }).join(","); }).join("\r\n");
  var a=document.createElement("a"); a.href="data:text/csv;charset=utf-8,%EF%BB%BF"+encodeURIComponent(csv); a.download=clase.name.replace(/[^a-zA-Z0-9]/g,"_")+"_asistencia.csv"; a.click();
}

/* ══════════ ROSTER ══════════ */
function renderRoster(){
  S.screen="roster"; drawSidebar();
  var curso=S.cursoSel;
  var lista=S.roster.filter(function(r){ return r.cursoId===curso.id; }).sort(function(a,b){ return (a.apellido+a.nombre).localeCompare(b.apellido+b.nombre); });
  setBC(["Mis Cursos",esc(curso.name),"Lista de Estudiantes"]);
  setTopActions('<button class="btn btn-ghost btn-sm" id="btn-back-ros">← Volver</button>');
  var h='<div class="card"><div class="card-body"><p style="font-weight:700;font-size:16.5px;margin-bottom:4px">📂 Importar desde CSV</p><p style="font-size:14.5px;color:var(--gray-400);margin-bottom:12px">Columnas: <strong>Apellido, Nombre, RUT</strong> (primera fila con encabezados)</p>';
  h+='<div style="display:flex;gap:10px;flex-wrap:wrap"><div style="flex:1;min-width:180px"><input type="file" id="inp-file" accept=".csv" style="border-radius:8px;font-size:14.5px;padding:8px;margin-bottom:0;border:1.5px solid var(--gray-200)"></div>';
  h+='<button id="btn-csv" class="btn btn-primary" disabled>Importar</button></div></div>';
  h+='<div class="card-footer"><button id="btn-add-m" class="btn btn-secondary btn-sm">+ Agregar manualmente</button></div></div>';
  h+='<div id="form-add-m" style="display:none" class="card"><div class="card-body"><p style="font-weight:700;margin-bottom:12px">Nuevo Estudiante</p>';
  h+='<div class="field"><label>Apellido</label><input id="r-ap" type="text" placeholder="Apellido"></div>';
  h+='<div class="field"><label>Nombre</label><input id="r-nm" type="text" placeholder="Nombre"></div>';
  h+='<div class="field"><label>RUT / ID (opcional)</label><input id="r-rut" type="text" placeholder="Ej: 12345678-9"></div>';
  h+='</div><div class="card-footer"><button class="btn btn-secondary btn-sm" id="btn-can-m">Cancelar</button><button class="btn btn-primary btn-sm" id="btn-sav-m">Guardar</button></div></div>';
  if(!lista.length){
    h+='<div class="empty-state"><div class="ei">👥</div><div class="et">Lista vacía</div><div class="es">Importa un CSV o agrega estudiantes manualmente</div></div>';
  } else {
    h+='<div class="card"><div class="card-body" style="padding-bottom:4px"><p style="font-weight:700;margin-bottom:12px">'+lista.length+' estudiante'+(lista.length!==1?'s':'')+'</p>';
    lista.forEach(function(r){ h+='<div class="att-row"><div><div style="font-weight:500">'+esc(r.apellido)+', '+esc(r.nombre)+'</div>'+(r.rut?'<div style="font-size:12.5px;color:var(--gray-400)">'+esc(r.rut)+'</div>':'')+'</div><button class="btn-icon del-r" data-id="'+esc(r.id)+'">🗑</button></div>'; });
    h+='</div></div>';
  }
  setContent(h);
  $("btn-back-ros").onclick=function(){ renderCurso(); };
  $("btn-add-m").onclick=function(){ $("form-add-m").style.display="block"; $("r-ap").focus(); };
  $("btn-can-m").onclick=function(){ $("form-add-m").style.display="none"; };
  $("btn-sav-m").onclick=async function(){ var ap=$("r-ap").value.trim(),nm=$("r-nm").value.trim(),rut=$("r-rut").value.trim(); if(!ap||!nm){ alert("Apellido y nombre son obligatorios."); return; } S.roster.push({id:uid(),cursoId:S.cursoSel.id,apellido:ap,nombre:nm,rut:rut,createdAt:Date.now()}); try{ await post({action:"set",roster:S.roster}); }catch(e){} renderRoster(); };
  var fi=$("inp-file"),bc=$("btn-csv");
  fi.onchange=function(){ bc.disabled=!fi.files.length; };
  bc.onclick=function(){
    var f=fi.files[0]; if(!f) return;
    var reader=new FileReader();
    reader.onload=async function(e){
      var text=e.target.result, fl=text.split(/\r?\n/)[0];
      var sep=(fl.match(/;/g)||[]).length>(fl.match(/,/g)||[]).length?";":",";
      var lines=text.split(/\r?\n/).filter(function(l){ return l.trim(); });
      if(lines.length<2){ alert("El archivo no contiene datos."); return; }
      var added=0;
      for(var i=1;i<lines.length;i++){
        var cols=lines[i].split(sep).map(function(c){ return c.trim().replace(/^"|"$/g,""); });
        var ap=cols[0]||"",nm=cols[1]||"",rut=cols[2]||""; if(!ap||!nm) continue;
        if(S.roster.some(function(r){ return r.cursoId===S.cursoSel.id&&normName(r.apellido)===normName(ap)&&normName(r.nombre)===normName(nm); })) continue;
        S.roster.push({id:uid(),cursoId:S.cursoSel.id,apellido:ap,nombre:nm,rut:rut,createdAt:Date.now()}); added++;
      }
      try{ await post({action:"set",roster:S.roster}); }catch(e){}
      alert("Se importaron "+added+" estudiantes."); renderRoster();
    };
    reader.readAsText(f,"UTF-8");
  };
  $$(".del-r").forEach(function(b){ b.onclick=async function(){ if(!confirm("¿Eliminar estudiante de la lista?")) return; S.roster=S.roster.filter(function(r){ return r.id!==b.dataset.id; }); try{ await post({action:"set",roster:S.roster}); }catch(e){} renderRoster(); }; });
}

/* ══════════ REPORTE ══════════ */
function renderReporte(){
  S.screen="reporte"; drawSidebar();
  var curso=S.cursoSel;
  var clases=S.clases.filter(function(c){ return c.cursoId===curso.id; }).sort(function(a,b){ return a.createdAt-b.createdAt; });
  var roster=S.roster.filter(function(r){ return r.cursoId===curso.id; }).sort(function(a,b){ return (a.apellido+a.nombre).localeCompare(b.apellido+b.nombre); });
  setBC(["Mis Cursos",esc(curso.name),"Reporte"]);
  setTopActions('<button class="btn btn-ghost btn-sm" id="btn-back-rep">← Volver</button><button class="btn btn-primary btn-sm" id="btn-exp-rep">⬇ Excel</button>');
  var h="";
  if(!clases.length){ h='<div class="empty-state"><div class="ei">📊</div><div class="et">Sin clases</div></div>'; setContent(h); $("btn-back-rep").onclick=function(){ renderCurso(); }; return; }
  var total=0, rLen=roster.length;
  if(rLen&&clases.length){ roster.forEach(function(r){ clases.forEach(function(cl){ if(S.attendees.some(function(a){ return a.claseId===cl.id&&normName(a.apellido)===normName(r.apellido)&&normName(a.nombre)===normName(r.nombre); })) total++; }); }); }
  var pct=rLen&&clases.length?Math.round(100*total/(rLen*clases.length)):0;
  h+='<div class="stats-row"><div class="stat-card blue"><div class="sv">'+clases.length+'</div><div class="sl">Clases</div></div>';
  h+='<div class="stat-card green"><div class="sv">'+rLen+'</div><div class="sl">Estudiantes</div></div>';
  h+='<div class="stat-card amber"><div class="sv">'+pct+'%</div><div class="sl">Promedio</div></div></div>';
  if(!rLen){
    h+='<div class="empty-state"><div class="ei">👥</div><div class="et">Sin lista de estudiantes</div><div class="es">Carga la lista del curso para ver el reporte por alumno</div></div>';
  } else {
    h+='<div class="card" style="overflow-x:auto"><div class="card-body" style="padding:0"><table class="report-table">';
    h+='<thead><tr><th class="nc">Estudiante</th>';
    clases.forEach(function(cl){ h+='<th title="'+esc(cl.name)+'">'+fmtDShort(cl.createdAt)+'</th>'; });
    h+='<th style="background:var(--brand-l);color:var(--brand)">%</th></tr></thead><tbody>';
    roster.forEach(function(r){
      var ac=0; h+='<tr><td class="nc">'+esc(r.apellido)+', '+esc(r.nombre)+'</td>';
      clases.forEach(function(cl){ var was=S.attendees.some(function(a){ return a.claseId===cl.id&&normName(a.apellido)===normName(r.apellido)&&normName(a.nombre)===normName(r.nombre); }); if(was) ac++; h+='<td>'+(was?'<span style="color:#16a34a;font-size:16.5px">✓</span>':'<span style="color:var(--gray-300)">—</span>')+'</td>'; });
      var p=Math.round(100*ac/clases.length), col=p>=75?"#16a34a":p>=50?"#d97706":"#ef4444";
      h+='<td style="font-weight:700;color:'+col+';background:var(--gray-50)">'+p+'%</td></tr>';
    });
    h+='</tbody></table></div></div>';
  }
  setContent(h);
  $("btn-back-rep").onclick=function(){ renderCurso(); };
  $("btn-exp-rep").onclick=exportReporteCSV;
}

function exportReporteCSV(){
  var curso=S.cursoSel;
  var clases=S.clases.filter(function(c){ return c.cursoId===curso.id; }).sort(function(a,b){ return a.createdAt-b.createdAt; });
  var roster=S.roster.filter(function(r){ return r.cursoId===curso.id; }).sort(function(a,b){ return (a.apellido+a.nombre).localeCompare(b.apellido+b.nombre); });
  if(!roster.length){ var seen={}; S.attendees.filter(function(a){ return a.cursoId===curso.id; }).forEach(function(a){ var k=normName(a.apellido)+"|"+normName(a.nombre); if(!seen[k]) seen[k]={apellido:a.apellido,nombre:a.nombre,rut:a.rut||""}; }); roster=Object.values(seen).sort(function(a,b){ return (a.apellido+a.nombre).localeCompare(b.apellido+b.nombre); }); }
  var header=["Apellido","Nombre","RUT"]; clases.forEach(function(cl){ header.push(cl.name+" ("+fmtD(cl.createdAt)+")"); }); header.push("Asistencias"); header.push("% Asistencia");
  var rows=[header];
  roster.forEach(function(r){ var row=[r.apellido||"",r.nombre||"",r.rut||""],ac=0; clases.forEach(function(cl){ var was=S.attendees.some(function(a){ return a.claseId===cl.id&&normName(a.apellido)===normName(r.apellido)&&normName(a.nombre)===normName(r.nombre); }); if(was) ac++; row.push(was?"P":"A"); }); row.push(ac); row.push(clases.length?Math.round(100*ac/clases.length)+"%":"0%"); rows.push(row); });
  var csv=rows.map(function(r){ return r.map(function(v){ return '"'+String(v).replace(/"/g,'""')+'"'; }).join(","); }).join("\r\n");
  var a=document.createElement("a"); a.href="data:text/csv;charset=utf-8,%EF%BB%BF"+encodeURIComponent(csv); a.download=curso.name.replace(/[^a-zA-Z0-9]/g,"_")+"_reporte_consolidado.csv"; a.click();
}

init();
</script>
</body>
</html>
